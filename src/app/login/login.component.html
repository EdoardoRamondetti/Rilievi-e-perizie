<ion-content [fullscreen]="true" class="login-content">
  <div class="login-wrap">

    <!-- Brand header -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <path d="M14 2v6h6"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="12" y2="17"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Rilievi &amp; Perizie</span>
        <span class="brand-role">Portale Operatori</span>
      </div>
    </div>

    <!-- Titolo pagina -->
    <div class="page-title">
      <h1>Accedi</h1>
      <p>Inserisci le tue credenziali o usa il tuo account aziendale</p>
    </div>

    <!-- Card form -->
    <div class="form-card">

      <!-- Campo username -->
      <div class="field">
        <label class="field-label">Username</label>
        <div class="field-inner">
          <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <ion-input
            class="custom-input"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="nome@azienda.it"
            required
            autocomplete="username">
          </ion-input>
        </div>
      </div>

      <!-- Campo password -->
      <div class="field">
        <label class="field-label">Password</label>
        <div class="field-inner">
          <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <ion-input
            class="custom-input"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••••"
            required
            autocomplete="current-password">
          </ion-input>
        </div>
      </div>

      <!-- Messaggio di errore -->
      @if (errorMessage) {
        <div class="error-box">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ errorMessage }}
        </div>
      }

      <!-- Bottone accedi standard -->
      <button
        class="btn-accedi"
        [disabled]="isLoading"
        (click)="onLogin()">
        @if (isLoading) {
          <ion-spinner name="crescent" class="btn-spin"></ion-spinner>
          <span>Accesso in corso…</span>
        } @else {
          <span>Accedi</span>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        }
      </button>

      <!-- Separatore -->
      <div class="separator">
        <span>oppure continua con</span>
      </div>

      <!-- Bottone Google -->
      <button type="button" class="google-login-btn" (click)="onGoogleLogin()" [disabled]="isLoading">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24px" height="24px">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,24,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.422-5.192l-6.239-5.239C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l.001-.002l6.239,5.239C36.906,39.292,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
      </svg>
      Continua con Google
    </button>

    </div>

    <p class="version-note">Solo personale autorizzato · v1.0</p>
  </div>
</ion-content>
