<div class="pagina-login">

  <!-- Card centrale -->
  <div class="login-card">

    <!-- Logo + titolo -->
    <div class="brand">
      <div class="logo-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <path d="M14 2v6h6"/>
          <line x1="8"  y1="13" x2="16" y2="13"/>
          <line x1="8"  y1="17" x2="13" y2="17"/>
          <circle cx="18" cy="17" r="3.5" fill="white" stroke="#d85a30" stroke-width="1.5"/>
          <path d="M16.8 17l.9.9 1.8-1.8" stroke="#d85a30" stroke-width="1.3"/>
        </svg>
      </div>
      <div>
        <h1 class="brand-nome">Rilievi &amp; Perizie</h1>
        <p class="brand-sub">Pannello amministratore</p>
      </div>
    </div>

    <hr class="separatore" />

    <!-- Campo email -->
    <div class="campo">
      <label class="etichetta" for="email">Email</label>
      <input
        id="email"
        class="input"
        type="email"
        placeholder="admin@azienda.it"
        autocomplete="username"
        [(ngModel)]="username"
        (keydown)="onEnter($event)"
        [disabled]="loading"
      />
    </div>

    <!-- Campo password -->
    <div class="campo">
      <label class="etichetta" for="password">Password</label>
      <input
        id="password"
        class="input"
        type="password"
        placeholder="••••••••••"
        autocomplete="current-password"
        [(ngModel)]="password"
        (keydown)="onEnter($event)"
        [disabled]="loading"
      />
    </div>

    <!-- Messaggio di errore (mostrato solo se c'è un errore) -->
    @if (errore) {
      <div class="errore">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="7"/>
          <line x1="8" y1="5" x2="8" y2="8.5"/>
          <circle cx="8" cy="11" r=".6" fill="currentColor" stroke="none"/>
        </svg>
        {{ errore }}
      </div>
    }

    <!-- Bottone accedi -->
    <button
      class="btn-accedi"
      (click)="login()"
      [disabled]="loading"
    >
      <!-- Spinner durante il caricamento -->
      @if (loading) {
        <span class="spinner"></span>
      }
      <span>{{ loading ? 'Accesso in corso…' : 'Accedi' }}</span>
    </button>

    <!-- Nota informativa -->
    <p class="nota">
      Solo gli amministratori possono accedere a questa applicazione
    </p>

  </div>

</div>
